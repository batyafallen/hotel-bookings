<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали отеля - ОтельБук</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .room-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .room-card { background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .room-hero { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 60px 40px; text-align: center; }
        .room-hero h1 { font-size: 42px; margin-bottom: 15px; }
        .room-rating { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 40px; }
        .room-content { padding: 40px; }
        .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .room-img { background: #f1f5f9; border-radius: 24px; overflow: hidden; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        .room-img img { width: 100%; height: 100%; object-fit: cover; }
        .price-block { background: #f8fafc; padding: 20px; border-radius: 20px; text-align: center; margin: 20px 0; }
        .price-block .price { font-size: 36px; font-weight: 700; color: #2563eb; }
        .book-now-btn { background: #2563eb; color: white; border: none; padding: 16px; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #2563eb; text-decoration: none; }
        .date-picker { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .date-picker input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 16px; flex: 1; }
        @media (max-width: 768px) { .room-grid { grid-template-columns: 1fr; } .room-hero h1 { font-size: 28px; } }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">🏠 ОтельБук</div>
    <div class="toolbar-buttons">
        <button class="tool-btn" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Главная</button>
        <button class="tool-btn" id="helpBtn"><i class="fas fa-question-circle"></i> Справка</button>
        <button class="tool-btn" onclick="window.location.href='bookings.html'"><i class="fas fa-calendar-check"></i> Бронирования</button>
    </div>
    <div class="profile" onclick="window.location.href='profile.html'">
        <i class="fas fa-user-circle"></i>
        <span>Профиль</span>
    </div>
</div>

<div class="room-container" id="roomContainer"></div>

<footer>
    <div class="footer-content">
        <div><h4>ОтельБук</h4><p>Бронирование жилья с 2015 года</p></div>
        <div><h4>Контакты</h4><p>support@otelbook.com</p></div>
    </div>
</footer>

<script src="data.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = parseInt(urlParams.get('id'));
    const room = rooms.find(r => r.id === roomId);
    
    function renderRoom() {
        const container = document.getElementById("roomContainer");
        if (!room) {
            container.innerHTML = `<div class="room-card" style="text-align:center; padding:60px;"><h2>😕 Отель не найден</h2><a href="index.html" class="back-btn">← На главную</a></div>`;
            return;
        }
        container.innerHTML = `
            <div class="room-card">
                <div class="room-hero">
                    <h1>${room.name}</h1>
                    <div class="room-rating">⭐ ${room.rating} / 5.0</div>
                </div>
                <div class="room-content">
                    <div class="room-grid">
                        <div class="room-img">
                            <img src="${room.img}" alt="${room.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27400%27 height=%27300%27 viewBox=%270 0 400 300%27%3E%3Crect width=%27400%27 height=%27300%27 fill=%27%232563eb%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 dy=%27.3em%27 fill=%27white%27 font-size=%2724%27%3E🏨%3C/text%3E%3C/svg%3E'">
                        </div>
                        <div class="room-info">
                            <p><strong>📍 Расположение:</strong> ${room.location}</p>
                            <p><strong>📝 Описание:</strong> ${room.description}</p>
                            <div class="price-block"><div class="price">${room.price.toLocaleString()} ₽</div><div>за ночь</div></div>
                        </div>
                    </div>
                    <div class="date-picker">
                        <input type="date" id="checkin" placeholder="Дата заезда">
                        <input type="date" id="checkout" placeholder="Дата выезда">
                    </div>
                    <button class="book-now-btn" onclick="bookThisRoom(${room.id})">📅 Забронировать сейчас</button>
                    <a href="index.html" class="back-btn">← Назад к результатам</a>
                </div>
            </div>
        `;
    }
    
    function bookThisRoom(id) {
        const checkin = document.getElementById("checkin")?.value;
        const checkout = document.getElementById("checkout")?.value;
        if (!checkin || !checkout) {
            alert("❌ Выберите даты заезда и выезда!");
            return;
        }
        if (new Date(checkin) >= new Date(checkout)) {
            alert("❌ Дата выезда должна быть позже даты заезда!");
            return;
        }
        const roomToBook = rooms.find(r => r.id === id);
        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
        if (bookings.some(b => b.id === id)) {
            alert(`❌ ${roomToBook.name} уже в бронированиях!`);
        } else {
            bookings.push({...roomToBook, checkin, checkout});
            localStorage.setItem("bookings", JSON.stringify(bookings));
            alert(`✅ ${roomToBook.name} забронирован с ${checkin} по ${checkout}!`);
        }
    }
    
    function openHelp() {
        alert("Справка: выберите даты и нажмите Забронировать");
    }
    
    document.getElementById("helpBtn")?.addEventListener("click", openHelp);
    document.addEventListener("DOMContentLoaded", renderRoom);
    
    function loadAvatarToHeader() {
        const savedAvatar = localStorage.getItem("userAvatar");
        const profileDiv = document.querySelector(".profile");
        if (!profileDiv) return;
        const onclickAttr = profileDiv.getAttribute("onclick");
        profileDiv.innerHTML = '';
        if (savedAvatar && savedAvatar.startsWith('data:image')) {
            const img = document.createElement("img");
            img.src = savedAvatar;
            img.style.cssText = "width:24px; height:24px; border-radius:50%; object-fit:cover;";
            profileDiv.appendChild(img);
        } else {
            const icon = document.createElement("i");
            icon.className = "fas fa-user-circle";
            icon.style.cssText = "font-size:24px; color:#2563eb;";
            profileDiv.appendChild(icon);
        }
        const span = document.createElement("span");
        span.innerText = "Профиль";
        profileDiv.appendChild(span);
        if (onclickAttr) profileDiv.setAttribute("onclick", onclickAttr);
        else profileDiv.onclick = () => window.location.href = 'profile.html';
    }
    document.addEventListener("DOMContentLoaded", loadAvatarToHeader);
</script>

</body>
</html>
